<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitten Code Receipt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/quotation.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>
    <div class="app-container no-print">

        <!-- Left Panel: Form Input -->
        <div class="form-panel">
            <div class="form-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="fas fa-file-invoice-dollar"></i> สร้างใบเสร็จรับเงิน</h2>
                <button type="button" onclick="clearDraft()"
                    style="padding: 6px 12px; font-size: 0.85rem; background: #dc2626; color: #fff; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s;">
                    <i class="fas fa-eraser"></i> Clear Draft
                </button>
            </div>

            <form id="quote-form">
                <!-- Section: Document Info -->
                <div class="form-section">
                    <h3><i class="fas fa-file-alt"></i> ข้อมูลเอกสาร</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>เลขที่ใบเสร็จ</label>
                            <input type="text" id="in-doc-no" value="" placeholder="e.g., BI-20190008"
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>วันที่ออกใบเสร็จ</label>
                            <input type="date" id="in-doc-date" value="" oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>การชำระเงิน</label>
                            <select id="in-doc-payment" onchange="buildPreview()">
                                <option value="เงินสด">เงินสด</option>
                                <option value="โอนเงิน">โอนเงิน</option>
                                <option value="เช็คธนาคาร">เช็คธนาคาร</option>
                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>พนักงานขาย</label>
                            <input type="text" id="in-doc-salesman" value="" placeholder="Salesman Name"
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>เลขที่ใบแจ้งหนี้</label>
                            <input type="text" id="in-doc-invoice" value="" placeholder="e.g., IN-20190008"
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>เอกสารอ้างอิง</label>
                            <input type="text" id="in-doc-ref" value="" placeholder="Reference..."
                                oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Section: Customer -->
                <div class="form-section">
                    <h3><i class="fas fa-user-tie"></i> ข้อมูลลูกค้า</h3>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>ชื่อลูกค้า</label>
                            <input type="text" id="in-cust-name" value=""
                                placeholder="Enter company or customer name..." oninput="buildPreview()">
                        </div>
                        <div class="form-group full-width">
                            <label>เลขประจำตัวผู้เสียภาษีอากร</label>
                            <input type="text" id="in-cust-tax" value=""
                                placeholder="e.g., 01909019999999 (Head Office)" oninput="buildPreview()">
                        </div>
                        <div class="form-group full-width">
                            <label>ที่อยู่</label>
                            <textarea id="in-cust-addr" rows="2" oninput="buildPreview()"
                                placeholder="Enter customer address..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>ชื่อโปรเจ็ค</label>
                            <input type="text" id="in-proj-name" value="" placeholder="Enter project name..."
                                oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Section: Line Items -->
                <div class="form-section">
                    <div class="flex-between">
                        <h3><i class="fas fa-list-ul"></i>รายละเอียดสินค้า / บริการ</h3>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="addItemLine()">
                            <i class="fas fa-plus"></i> เพิ่มรายการ
                        </button>
                    </div>

                    <div id="items-container">
                        <!-- Items will be injected here via JS -->
                    </div>
                </div>

                <!-- Section: Summary Options -->
                <div class="form-section">
                    <h3><i class="fas fa-calculator"></i> รายละเอียดสรุป</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>ส่วนลด</label>
                            <input type="number" id="in-special-discount" value="0" step="0.01"
                                oninput="state.discount = Number(this.value); buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>ภาษีมูลค่าเพิ่ม (%)</label>
                            <input type="number" id="in-doc-vat" value="7" oninput="buildPreview()">
                        </div>
                        <div class="form-group full-width">
                            <label>รายละเอียดการชำระเงิน</label>
                            <textarea id="in-payment-detail" rows="2" oninput="buildPreview()"
                                placeholder="e.g., Bank Transfer to Kasikorn Bank..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Section: Note -->
                <div class="form-section">
                    <h3><i class="fas fa-sticky-note"></i> หมายเหตุ / Note</h3>
                    <div class="form-group full-width">
                        <textarea id="in-note" placeholder="ระบุหมายเหตุ..."
                            oninput="state.note = this.value; buildPreview()"></textarea>
                    </div>
                </div>

                <!-- Section: Signatures -->
                <div class="form-section">
                    <h3><i class="fas fa-signature"></i> Signatures</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>ผู้รับเงิน</label>
                            <input type="text" id="in-sign-receiver" value="" placeholder="Enter receiver name..."
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>ผู้มีอำนาจลงนาม</label>
                            <input type="text" id="in-sign-auth" value="" placeholder="Enter authorized name..."
                                oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Print Action -->
                <div class="form-section print-section">
                    <button type="button" id="btn-print" class="btn btn-primary btn-large full-width-btn"
                        onclick="window.print()" style="width: 100%; padding: 15px; font-size: 16px; margin-top: 10px;">
                        <i class="fas fa-print"></i> Print Receipt (A4)
                    </button>
                    <button type="button" id="btn-save-cloud" class="btn btn-success btn-large full-width-btn"
                        onclick="saveDocumentToFirestore()"
                        style="width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; background-color: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s;">
                        <i class="fas fa-cloud-upload-alt"></i> Save to Cloud
                    </button>
                </div>

            </form>
        </div>

        <!-- Right Panel: A4 Preview -->
        <div class="preview-panel" id="preview-panel">
            <!-- JavaScript will render the paginated preview here -->
        </div>
    </div>

    <script src="../assets/js/script-receipt.js"></script>
    <script type="module">
        import { onAuthStateChanged, auth } from '../assets/js/firebase-config.js';
        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.replace('login.html'); }
        });
    </script>
</body>

</html>
