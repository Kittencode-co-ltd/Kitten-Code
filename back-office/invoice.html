<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitten Code Invoice Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/quotation.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>
    <div class="app-container no-print">

        <!-- Left Panel: Form Input -->
        <div class="form-panel">
            <div class="form-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="fas fa-file-invoice-dollar"></i> สร้างใบแจ้งหนี้ (Invoice)</h2>
                <button type="button" onclick="clearDraft()"
                    style="padding: 6px 12px; font-size: 0.85rem; background: #dc2626; color: #fff; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s;">
                    <i class="fas fa-eraser"></i> Clear Draft
                </button>
            </div>

            <form id="quote-form">
                <!-- Company Profile details are now fixed in the preview pane directly -->

                <!-- Section: Document Info -->
                <div class="form-section">
                    <h3><i class="fas fa-file-alt"></i> ข้อมูลเอกสาร</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>เลขที่ใบแจ้งหนี้</label>
                            <input type="text" id="in-doc-no" value="" placeholder="เช่น INV-2026001"
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>วันที่</label>
                            <input type="date" id="in-doc-date" value="" oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>วันครบกำหนด (Due Date)</label>
                            <input type="date" id="in-doc-due-date" value="" oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>เงื่อนไขชำระเงิน (เครดิต)</label>
                            <input type="text" id="in-doc-terms" value="" placeholder="เช่น 30 วัน"
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>เลขอ้างอิงลูกค้า (P.O. No)</label>
                            <input type="text" id="in-doc-ref" value="" placeholder="เช่น PO-12345"
                                oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Section: Customer -->
                <div class="form-section">
                    <h3><i class="fas fa-user-tie"></i> ข้อมูลลูกค้า</h3>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>ชื่อลูกค้า</label>
                            <input type="text" id="in-cust-name" value="" placeholder="ระบุชื่อบริษัทหรือชื่อลูกค้า..."
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group full-width">
                            <label>ที่อยู่</label>
                            <textarea id="in-cust-addr" oninput="buildPreview()"
                                placeholder="ระบุที่อยู่ลูกค้า..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>เบอร์โทร</label>
                            <input type="text" id="in-cust-tel" value="" placeholder="เช่น 08x-xxx-xxxx"
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>เลขประจำตัวผู้เสียภาษีอากร</label>
                            <input type="text" id="in-cust-tax" value="" placeholder="เช่น 1234567890123"
                                oninput="buildPreview()">
                        </div>
                    </div>
                </div>



                <!-- Section: Project Info -->
                <div class="form-section">
                    <h3><i class="fas fa-project-diagram"></i> ข้อมูลโปรเจคและการอ้างอิง</h3>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>ชื่อโปรเจค (Project Name)</label>
                            <input type="text" id="in-proj-name" value="" placeholder="ระบุชื่อโปรเจค..." oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>ชื่อผู้ติดต่อ (Contact Name)</label>
                            <input type="text" id="in-proj-contact" value="" placeholder="ระบุชื่อผู้ติดต่อ..." oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>พนักงานขาย (Salesperson)</label>
                            <input type="text" id="in-sales-name" value="" placeholder="ระบุชื่อพนักงานขาย..." oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>เลขอ้างอิงใบเสนอราคา (Quotation No)</label>
                            <input type="text" id="in-quote-ref" value="" placeholder="เช่น QT-2026001" oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Section: Line Items -->
                <div class="form-section">
                    <div class="flex-between">
                        <h3><i class="fas fa-list-ul"></i> รายการสินค้า / บริการ</h3>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="addItemLine()">
                            <i class="fas fa-plus"></i> เพิ่มรายการ
                        </button>
                    </div>

                    <div id="items-container">
                        <!-- Items will be injected here via JS -->
                    </div>
                </div>

                <!-- Section: Summary -->
                <div class="form-section">
                    <h3><i class="fas fa-calculator"></i> ส่วนสรุป</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>ส่วนลด (บาท)</label>
                            <input type="number" id="in-doc-discount" value="0" min="0" step="0.01"
                                oninput="state.discount = Number(this.value); buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>ภาษีมูลค่าเพิ่ม (%)</label>
                            <input type="number" id="in-doc-vat" value="7" oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Section: Payment & Note -->
                <div class="form-section">
                    <h3><i class="fas fa-university"></i> ช่องทางชำระเงิน & หมายเหตุ</h3>
                    <div class="form-group full-width">
                        <label>ช่องทางชำระเงิน (Payment Method)</label>
                        <select id="in-payment-method" onchange="buildPreview()" style="width:100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--input-bg, #1e293b); color: var(--text-primary, #f1f5f9); font-size: 0.95rem; cursor: pointer;">
                            <option value="none">— ไม่แสดงช่องทางชำระเงิน —</option>
                            <option value="kasikorn">🏦 KASIKORN BANK (226-3-92729-2)</option>
                            <option value="krungthai">🏦 KRUNGTHAI BANK (665-6-09488-0)</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>หมายเหตุ</label>
                        <textarea id="in-note" placeholder="ระบุหมายเหตุ..."
                            oninput="state.note = this.value; buildPreview()"></textarea>
                    </div>
                </div>

                <!-- Section: Signatures -->
                <div class="form-section">
                    <h3><i class="fas fa-signature"></i> ข้อมูลลายเซ็น</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>ผู้รับใบแจ้งหนี้ (Bill Receiver)</label>
                            <input type="text" id="in-sign-receiver" value="" placeholder="ระบุชื่อผู้รับใบแจ้งหนี้..."
                                oninput="buildPreview()">
                        </div>
                        <div class="form-group">
                            <label>ผู้มีอำนาจลงนาม (Authorized Signature)</label>
                            <input type="text" id="in-sign-auth" value="" placeholder="ระบุชื่อผู้มีอำนาจลงนาม..."
                                oninput="buildPreview()">
                        </div>
                    </div>
                </div>

                <!-- Print Action -->
                <div class="form-section print-section">
                    <button type="button" id="btn-print" class="btn btn-primary btn-large full-width-btn"
                        onclick="window.print()" style="width: 100%; padding: 15px; font-size: 16px; margin-top: 10px;">
                        <i class="fas fa-print"></i> พิมพ์ใบแจ้งหนี้ (A4)
                    </button>
                    <button type="button" id="btn-save-cloud" class="btn btn-success btn-large full-width-btn"
                        onclick="saveDocumentToFirestore()"
                        style="width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; background-color: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s;">
                        <i class="fas fa-cloud-upload-alt"></i> บันทึกข้อมูล (Save to Cloud)
                    </button>
                </div>

            </form>
        </div>

        <!-- Right Panel: A4 Preview -->
        <div class="preview-panel" id="preview-panel">
            <!-- JavaScript will render the paginated preview here -->
        </div>
    </div>

    <script src="../assets/js/script-invoice.js"></script>
    <script type="module">
        import { onAuthStateChanged, auth } from '../assets/js/firebase-config.js';
        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.replace('login.html'); }
        });
    </script>
</body>

</html>
