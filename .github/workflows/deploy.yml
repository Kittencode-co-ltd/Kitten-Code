name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Inject Firebase config from GitHub Secrets ──────────
      # Secrets are NEVER echoed or logged. The 'add-mask' command
      # ensures any accidental leak is masked in GitHub logs.
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.FIREBASE_API_KEY }}"
          echo "::add-mask::${{ secrets.FIREBASE_APP_ID }}"
          echo "::add-mask::${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"

      - name: Generate __ENV__.js
        run: |
          cat > assets/js/__ENV__.js << 'ENVEOF'
          window.__ENV__ = {
            FIREBASE_API_KEY:             "PLACEHOLDER_API_KEY",
            FIREBASE_AUTH_DOMAIN:         "PLACEHOLDER_AUTH_DOMAIN",
            FIREBASE_PROJECT_ID:          "PLACEHOLDER_PROJECT_ID",
            FIREBASE_STORAGE_BUCKET:      "PLACEHOLDER_STORAGE_BUCKET",
            FIREBASE_MESSAGING_SENDER_ID: "PLACEHOLDER_SENDER_ID",
            FIREBASE_APP_ID:              "PLACEHOLDER_APP_ID"
          };
          ENVEOF
          # Replace placeholders with actual secrets (values never appear in logs)
          sed -i "s|PLACEHOLDER_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g"                   assets/js/__ENV__.js
          sed -i "s|PLACEHOLDER_AUTH_DOMAIN|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g"           assets/js/__ENV__.js
          sed -i "s|PLACEHOLDER_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|g"             assets/js/__ENV__.js
          sed -i "s|PLACEHOLDER_STORAGE_BUCKET|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g"     assets/js/__ENV__.js
          sed -i "s|PLACEHOLDER_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g"     assets/js/__ENV__.js
          sed -i "s|PLACEHOLDER_APP_ID|${{ secrets.FIREBASE_APP_ID }}|g"                     assets/js/__ENV__.js

      # ── Upload & Deploy ─────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # deploy entire repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
